# Must match the Worker's actual name in the Cloudflare dashboard (it was auto-named "elan-quant"
# from the repo name when created via "Ship something new" -> connect to Git, not "elan-quant-cron").
name = "elan-quant"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Same D1 database the Pages project (../wrangler.toml) binds as ELAN_QUANT_DB.
[[d1_databases]]
binding = "ELAN_QUANT_DB"
database_name = "elan-quant-db"
database_id = "dd4ed81c-fb85-43fd-b4ba-4485857fa6fe"

# Weekdays only, 10:00 UTC = 18:00 Taipei. Originally 19:00 (1hr later) as a conservative default —
# TWSE officially publishes T86 (三大法人買賣超, the slowest of the 5 reports this cron reads) around
# 17:00 Taipei, so 18:00 keeps a 1hr safety buffer instead of waiting 2 extra hours unnecessarily.
# daily_market_data.updated_at records the actual wall-clock write time each day, so if 18:00 ever
# proves too early (fields showing NULL because TWSE hadn't settled yet), that'll be directly visible
# in the data rather than silently guessed at.
#
# 第二個排程專門給主動式ETF持股爬蟲，獨立於主排程之外，原因分兩層：
#
# 1. 執行預算：2026-07-13與2026-07-15兩次正式排程都整批0/26掛零、但事後手動補跑都能
#    成功24-26/26——研判是「跟前面一長串序列步驟(台指/漲跌家數/融資/三大法人/全市場
#    個股/RSI篩選器/Put-Call/VIX/公債殖利率)共用同一次呼叫的執行時間預算」，尖峰時段
#    前面步驟變慢時，輪到最重的ETF步驟已經沒有時間預算，被Cloudflare平台層級直接砍斷
#    （不會進try/catch，也不會留下任何log）。分成兩個各自獨立的cron trigger，靠
#    scheduled()收到的event.cron字串分辨這次是哪一個，讓ETF步驟有自己完整的一份執行
#    時間預算，不用跟前面的步驟搶。
#
# 2. 資料到位時間：2026-07-21發現原本18:05這個時間點本身也太早——直接呼叫26家發行公司
#    的原始資料源實測，18:05排程當天0/26成功，但同一天22:00左右直接測試24/27成功
#    （另3檔是來源網站暫時性internal error，不是資料還沒公布）。代表多數發行公司的
#    當日持股揭露是市場收盤（13:30）後好幾個小時才會公布，18:05離收盤才4.5小時，
#    太早了。改成21:00台北時間（13:00 UTC），多留將近3小時緩衝。
[triggers]
crons = ["0 10 * * 1-5", "0 13 * * 1-5"]
